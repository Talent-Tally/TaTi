name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    outputs:
      app: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect relevant app changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'eslint.config.js'
              - '.prettierrc'
              - '.prettierignore'
              - 'vite.config.ts'
              - 'src/**'

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    timeout-minutes: 20

    steps:
      - name: Require safe-to-test label for fork PRs
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && !contains(github.event.pull_request.labels.*.name, 'safe to test') }}
        run: |
          echo "This workflow requires the 'safe to test' label for fork pull requests."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files safely
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"

          # Fallback when BASE_SHA is not present in local git graph (e.g. force-push / rewritten history).
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "BASE_SHA $BASE_SHA not found locally, using merge-base with origin/main."
            BASE_SHA="$(git merge-base HEAD origin/main)"
          fi

          # Collect all changed files in a null-delimited file.
          git diff --name-only -z "$BASE_SHA" "$HEAD_SHA" > /tmp/all_changed_files

          # Prettier: JS/TS/JSON/YAML/Markdown. ESLint n’a de config que pour TS/JS (pas les .md : sinon « no matching configuration »).
          : > /tmp/changed_files_for_checks
          : > /tmp/changed_files_for_lint
          while IFS= read -r -d '' file; do
            case "$file" in
              coverage/*|test-results/*|playwright-report/*|dist/*|.output/*|.vinxi/*)
                continue
                ;;
            esac
            case "$file" in
              *.js|*.jsx|*.ts|*.tsx|*.json|*.md|*.yml|*.yaml)
                printf '%s\0' "$file" >> /tmp/changed_files_for_checks
                ;;
            esac
            case "$file" in
              *.js|*.jsx|*.ts|*.tsx|*.json|*.yml|*.yaml)
                printf '%s\0' "$file" >> /tmp/changed_files_for_lint
                ;;
            esac
          done < /tmp/all_changed_files

          if [ -s /tmp/changed_files_for_checks ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -s /tmp/changed_files_for_lint ]; then
            echo "any_lint=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_lint=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint changed files
        if: steps.changed-files.outputs.any_lint == 'true'
        shell: bash
        run: xargs -0 -a /tmp/changed_files_for_lint npx eslint --

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Prettier check changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: xargs -0 -a /tmp/changed_files_for_checks npx prettier --check --

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: ${{ always() && hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Upload dist on failure
        if: ${{ failure() && hashFiles('dist/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/

  quality-status:
    name: quality-status
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: ${{ always() }}
    steps:
      - name: Fail only if quality job failed unexpectedly
        run: |
          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            echo "Changes detection failed or was cancelled."
            exit 1
          fi
          if [ "${{ needs.changes.outputs.app }}" = "true" ] && { [ "${{ needs.quality.result }}" = "failure" ] || [ "${{ needs.quality.result }}" = "cancelled" ]; }; then
            echo "Quality checks failed or were cancelled."
            exit 1
          fi
          echo "Quality status gate passed."
